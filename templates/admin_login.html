<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>管理者ログイン</title>
    <style>
        body {
            background: #f4f6f8;
            font-family: Arial, sans-serif;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .login-card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.12);
            padding: 32px 28px;
            width: 320px;
            text-align: center;
        }
        .login-card h1 {
            font-size: 20px;
            color: #1b5e20;
            margin: 0 0 6px;
        }
        .login-card p {
            font-size: 13px;
            color: #888;
            margin: 0 0 24px;
        }
        .form-input {
            display: block;
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 15px;
            margin-bottom: 14px;
            outline: none;
            box-sizing: border-box;
        }
        .form-input:focus { border-color: #2e7d32; }
        .btn-login {
            display: block;
            width: 100%;
            padding: 13px;
            background: #2e7d32;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
        .btn-login:active { background: #1b5e20; }
        .error-msg {
            background: #ffebee;
            color: #c62828;
            padding: 10px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 16px;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <h1>管理者ログイン</h1>
        <p>管理画面へのアクセスには認証が必要です</p>
        {% if error %}
        <div class="error-msg">{{ error }}</div>
        {% endif %}
        <form method="post" action="/admin/login"><input type="hidden" name="csrf_token" value="{{ csrf_token }}">
            <input type="text" name="username" class="form-input" placeholder="ユーザー名" required autocomplete="off">
            <input type="password" name="password" class="form-input" placeholder="パスワード" required autocomplete="off">
            <button type="submit" class="btn-login">ログイン</button>
        </form>
    </div>
</body>
</html>
