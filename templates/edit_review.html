<!DOCTYPE html>
<html lang="ja" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>口コミ編集 — {{ app_name }}</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.23/dist/full.min.css" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
    tailwind.config = { theme: { extend: { colors: {
      brand: '#E07A5F', 'brand-dark': '#C85A42', sage: '#81B29A', 'sage-dark': '#5E9B80',
      golden: '#F2CC8F', ink: '#3D405B', cream: '#FAF8F0',
    }}}}
    </script>
</head>
<body class="bg-cream min-h-screen pb-20">

<div class="navbar bg-white border-b border-gray-200 fixed top-0 left-0 right-0 z-50 h-14 min-h-0 px-4">
  <div class="flex-1"><a href="/rating" class="font-bold text-ink text-lg tracking-tight">{{ app_name }}</a></div>
  <div class="dropdown dropdown-end">
    <div tabindex="0" role="button" class="btn btn-ghost btn-sm gap-1 text-ink/60">
      <span class="text-sm">{{ username }}</span>
      <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
    </div>
    <ul tabindex="0" class="dropdown-content menu bg-base-100 rounded-xl z-[200] w-48 p-2 shadow-xl border border-gray-100 mt-1">
      <li><a href="/help" class="text-sage-dark font-medium">ヘルプ</a></li>
      <li><a href="/export_my_data" class="text-sage-dark font-medium">マイデータ</a></li>
      <li><a href="/change_password" class="text-sage-dark font-medium">パスワード変更</a></li>
      <li><button onclick="this.closest('.dropdown').querySelector('[tabindex]').blur();document.getElementById('group-code-modal').classList.add('open')" class="text-blue-600 font-medium">グループコード</button></li>
      <li><button onclick="this.closest('.dropdown').querySelector('[tabindex]').blur();document.getElementById('logout-modal').classList.add('open')" class="text-red-500 font-medium">ログアウト</button></li>
    </ul>
  </div>
</div>

<main class="pt-16 px-4 max-w-md mx-auto">
    <a href="/store/{{ review.object_id }}" class="btn btn-ghost btn-sm text-ink/60 mb-3 px-0">← 戻る</a>

    <div class="card bg-white shadow-sm">
        <div class="card-body p-6">
            <h1 class="text-lg font-bold text-brand mb-2">口コミを編集</h1>
            <div class="text-sm font-bold text-ink bg-cream rounded-lg p-3 mb-5">{{ review.object_name }}</div>

            <form method="post" action="/edit_review/{{ review.review_id }}"><input type="hidden" name="csrf_token" value="{{ csrf_token }}">
                <label for="comment" class="block text-sm font-bold text-brand mb-1">コメント</label>
                <textarea name="comment" id="comment" class="textarea textarea-bordered bg-cream/50 focus:outline-none focus:border-brand w-full min-h-[120px] mb-1"
                          required maxlength="500">{{ review.comment }}</textarea>
                <div class="text-right text-xs text-ink/40 mb-4"><span id="char-count">{{ review.comment | length }}</span>/500</div>

                <button type="submit" class="btn bg-brand hover:bg-brand-dark text-white border-none w-full">更新する</button>
            </form>
        </div>
    </div>
</main>

<div class="btm-nav btm-nav-sm bg-white border-t border-gray-200 z-50">
  <a href="/rating" class="text-ink/40"><svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M11.48 3.499a.562.562 0 0 1 1.04 0l2.125 5.111a.563.563 0 0 0 .475.345l5.518.442c.499.04.701.663.321.988l-4.204 3.602a.563.563 0 0 0-.182.557l1.285 5.386a.562.562 0 0 1-.84.61l-4.725-2.885a.562.562 0 0 0-.586 0L6.982 20.54a.562.562 0 0 1-.84-.61l1.285-5.386a.562.562 0 0 0-.182-.557l-4.204-3.602a.562.562 0 0 1 .321-.988l5.518-.442a.563.563 0 0 0 .475-.345L11.48 3.5Z"/></svg><span class="btm-nav-label text-[11px]">評価</span></a>
  <a href="/recommendations" class="text-ink/40"><svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M9.813 15.904 9 18.75l-.813-2.846a4.5 4.5 0 0 0-3.09-3.09L2.25 12l2.846-.813a4.5 4.5 0 0 0 3.09-3.09L9 5.25l.813 2.846a4.5 4.5 0 0 0 3.09 3.09L15.75 12l-2.846.813a4.5 4.5 0 0 0-3.09 3.09ZM18.259 8.715 18 9.75l-.259-1.035a3.375 3.375 0 0 0-2.455-2.456L14.25 6l1.036-.259a3.375 3.375 0 0 0 2.455-2.456L18 2.25l.259 1.035a3.375 3.375 0 0 0 2.456 2.456L21.75 6l-1.035.259a3.375 3.375 0 0 0-2.456 2.456ZM16.894 20.567 16.5 21.75l-.394-1.183a2.25 2.25 0 0 0-1.423-1.423L13.5 18.75l1.183-.394a2.25 2.25 0 0 0 1.423-1.423l.394-1.183.394 1.183a2.25 2.25 0 0 0 1.423 1.423l1.183.394-1.183.394a2.25 2.25 0 0 0-1.423 1.423Z"/></svg><span class="btm-nav-label text-[11px]">おすすめ</span></a>
  <a href="/map" class="text-ink/40"><svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M15 10.5a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z"/><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 10.5c0 7.142-7.5 11.25-7.5 11.25S4.5 17.642 4.5 10.5a7.5 7.5 0 1 1 15 0Z"/></svg><span class="btm-nav-label text-[11px]">マップ</span></a>
  <a href="/request_object" class="text-ink/40"><svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v6m3-3H9m12 0a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z"/></svg><span class="btm-nav-label text-[11px]">リクエスト</span></a>
</div>

<script>
const textarea = document.getElementById('comment');
const charCount = document.getElementById('char-count');
textarea.addEventListener('input', () => {
    charCount.textContent = textarea.value.length;
});
</script>

<div class="fixed inset-0 bg-black/40 z-[10000] items-center justify-center hidden" id="group-code-modal">
    <div class="bg-white rounded-2xl shadow-2xl p-6 w-72 text-center">
        <h3 class="text-lg font-bold text-blue-600 mb-2">グループコード</h3>
        <p class="text-sm text-ink/50 mb-3">所属するグループのコードを入力してください。</p>
        <form method="post" action="/set_group_code"><input type="hidden" name="csrf_token" value="{{ csrf_token }}">
            <input type="text" name="group_code" placeholder="グループコード" value="{{ current_group_code or '' }}" class="input input-bordered w-full mb-3 text-base" />
            <div class="flex gap-2">
                <button type="button" class="btn btn-ghost flex-1" onclick="document.getElementById('group-code-modal').classList.remove('open')">キャンセル</button>
                <button type="submit" class="btn bg-blue-600 hover:bg-blue-700 text-white border-none flex-1">保存</button>
            </div>
        </form>
    </div>
</div>
<div class="fixed inset-0 bg-black/40 z-[10000] items-center justify-center hidden" id="logout-modal">
    <div class="bg-white rounded-2xl shadow-2xl p-6 w-72 text-center">
        <h3 class="text-lg font-bold text-ink mb-2">ログアウト</h3>
        <p class="text-sm text-ink/50 mb-5">ログアウトしますか？</p>
        <div class="flex gap-2">
            <button class="btn btn-ghost flex-1" onclick="document.getElementById('logout-modal').classList.remove('open')">キャンセル</button>
            <form method="post" action="/logout" class="flex-1"><input type="hidden" name="csrf_token" value="{{ csrf_token }}"><button type="submit" class="btn bg-red-500 hover:bg-red-600 text-white border-none w-full">ログアウト</button></form>
        </div>
    </div>
</div>
<style>#group-code-modal.open, #logout-modal.open { display: flex !important; }</style>
<script>if(new URLSearchParams(location.search).has('group_error')){document.getElementById('group-code-modal').classList.add('open');document.getElementById('group-error-msg').style.display='block';}</script>
</body>
</html>
