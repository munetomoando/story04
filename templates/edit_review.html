<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>口コミ編集 — ランチマップ</title>
    <link rel="stylesheet" href="/static/style.css?v=20260320">
    <style>
        .review-form-card {
            background: white;
            border-radius: 16px;
            padding: 24px 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        .review-form-title {
            font-size: 20px;
            color: #1b5e20;
            margin: 0 0 8px;
        }
        .review-store-name {
            font-size: 15px;
            color: #333;
            font-weight: bold;
            margin: 0 0 20px;
            padding: 10px 14px;
            background: #f0f7f0;
            border-radius: 8px;
        }
        .form-label {
            display: block;
            font-size: 14px;
            font-weight: bold;
            color: #2e7d32;
            margin-bottom: 6px;
        }
        .form-textarea {
            display: block;
            width: 100%;
            padding: 12px;
            border: 1px solid #a5d6a7;
            border-radius: 8px;
            font-size: 16px;
            margin-bottom: 16px;
            outline: none;
            resize: vertical;
            min-height: 120px;
            font-family: inherit;
            line-height: 1.6;
        }
        .form-textarea:focus { border-color: #2e7d32; }
        .char-count {
            text-align: right;
            font-size: 12px;
            color: #aaa;
            margin-top: -12px;
            margin-bottom: 16px;
        }
        .back-btn {
            display: inline-block;
            margin-bottom: 16px;
            padding: 10px 20px;
            font-size: 14px;
            font-weight: bold;
            color: #2e7d32;
            background: white;
            border: 2px solid #2e7d32;
            border-radius: 10px;
            text-decoration: none;
            cursor: pointer;
        }
        .back-btn:active { background: #e8f5e9; }
    </style>
</head>
<body class="app-page">

<header class="app-header">
    <a href="/rating" class="header-title" style="text-decoration:none;color:inherit;">神田三崎町ランチマップ</a>
    <span class="header-user" onclick="this.querySelector('.header-user-menu').classList.toggle('open')">
        {{ username }} ▾
        <div class="header-user-menu" id="user-menu">
            <a class="header-user-menu-item" href="/help" onclick="event.stopPropagation();" style="color:#2e7d32;text-decoration:none;">ヘルプ</a>
            <a class="header-user-menu-item" href="/export_my_data" onclick="event.stopPropagation();" style="color:#2e7d32;text-decoration:none;">マイデータ</a>
            <button class="header-user-menu-item" style="color:#1565c0;" onclick="event.stopPropagation();document.getElementById('group-code-modal').classList.add('open');document.querySelector('.header-user-menu').classList.remove('open')">グループコード</button>
            <button class="header-user-menu-item" onclick="event.stopPropagation();document.getElementById('logout-modal').classList.add('open');document.querySelector('.header-user-menu').classList.remove('open')">ログアウト</button>
        </div>
    </span>
</header>

<main class="app-main">
    <a href="/store/{{ review.object_id }}" class="back-btn">← 戻る</a>

    <div class="review-form-card">
        <h1 class="review-form-title">口コミを編集</h1>
        <div class="review-store-name">{{ review.object_name }}</div>

        <form method="post" action="/edit_review/{{ review.review_id }}"><input type="hidden" name="csrf_token" value="{{ csrf_token }}">
            <label for="comment" class="form-label">コメント</label>
            <textarea name="comment" id="comment" class="form-textarea"
                      required maxlength="500">{{ review.comment }}</textarea>
            <div class="char-count"><span id="char-count">{{ review.comment | length }}</span>/500</div>

            <button type="submit" class="btn-primary">更新する</button>
        </form>
    </div>
</main>

<nav class="bottom-nav">
    <a href="/rating" class="nav-item">
        <span class="nav-icon">⭐</span>
        <span class="nav-label">評価</span>
    </a>
    <a href="/recommendations" class="nav-item">
        <span class="nav-icon">🍽️</span>
        <span class="nav-label">おすすめ</span>
    </a>
    <a href="/map" class="nav-item">
        <span class="nav-icon">🗺️</span>
        <span class="nav-label">マップ</span>
    </a>
    <a href="/request_object" class="nav-item">
        <span class="nav-icon">➕</span>
        <span class="nav-label">リクエスト</span>
    </a>
</nav>

<script>
const textarea = document.getElementById('comment');
const charCount = document.getElementById('char-count');
textarea.addEventListener('input', () => {
    charCount.textContent = textarea.value.length;
});
</script>


<!-- グループコード入力モーダル -->
<div class="logout-overlay" id="group-code-modal">
    <div class="logout-card">
        <div class="logout-card-title" style="color:#1565c0;">グループコード</div>
        <div class="logout-card-msg">所属するグループのコードを入力してください。空欄で保存するとグループから外れます。</div>
        <form method="post" action="/set_group_code"><input type="hidden" name="csrf_token" value="{{ csrf_token }}">
            <input type="text" name="group_code" placeholder="グループコード"
                value="{{ current_group_code or '' }}"
                style="display:block;width:100%;padding:10px;border:1px solid #ccc;border-radius:8px;font-size:15px;margin-bottom:14px;box-sizing:border-box;">
            <div class="logout-card-actions">
                <button type="button" class="btn-logout-cancel" onclick="document.getElementById('group-code-modal').classList.remove('open')">キャンセル</button>
                <button type="submit" class="btn-logout-confirm" style="background:#1565c0;">保存</button>
            </div>
        </form>
    </div>
</div>
<!-- ログアウト確認モーダル -->
<div class="logout-overlay" id="logout-modal">
    <div class="logout-card">
        <div class="logout-card-title">ログアウト</div>
        <div class="logout-card-msg">ログアウトしますか？</div>
        <div class="logout-card-actions">
            <button class="btn-logout-cancel" onclick="document.getElementById('logout-modal').classList.remove('open')">キャンセル</button>
            <form method="post" action="/logout" style="display:inline;margin:0;flex:1;"><input type="hidden" name="csrf_token" value="{{ csrf_token }}"><button type="submit" class="btn-logout-confirm" style="width:100%;">ログアウト</button></form>
        </div>
    </div>
</div>
</body>
</html>
